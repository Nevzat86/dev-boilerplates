<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 600px; height: 600px; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
.cover {
  width: 600px; height: 600px;
  background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 40px; position: relative;
}
.save { position: absolute; top: 24px; right: 24px; background: linear-gradient(135deg, #f59e0b, #ef4444); color: #fff; font-size: 13px; font-weight: 800; padding: 8px 16px; border-radius: 20px; transform: rotate(5deg); }
.top-badge { display: inline-block; background: linear-gradient(135deg, #8b5cf6, #6366f1); color: #fff; font-size: 12px; font-weight: 700; padding: 5px 16px; border-radius: 16px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 20px; }
h1 { color: #fff; font-size: 38px; font-weight: 900; line-height: 1.1; margin-bottom: 16px; }
h1 span { background: linear-gradient(135deg, #c084fc, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.subtitle { color: #a5b4fc; font-size: 16px; margin-bottom: 28px; }
.icons { font-size: 48px; margin-bottom: 20px; display: flex; gap: 16px; }
.price-row { display: flex; align-items: center; gap: 12px; }
.price-old { color: #64748b; font-size: 18px; text-decoration: line-through; }
.price-new { color: #fff; font-size: 32px; font-weight: 900; }
</style></head>
<body>
<div class="cover">
  <div class="save">SAVE $9</div>
  <div class="top-badge">Bundle</div>
  <div class="icons"><span>&#x1F9E9;</span><span>&#x1F527;</span></div>
  <h1>Ship in <span>Days</span></h1>
  <p class="subtitle">Chrome MV3 + WP Plugin React Admin</p>
  <div class="price-row">
    <span class="price-old">$58</span>
    <span class="price-new">$49</span>
  </div>
</div>
</body></html>

<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 600px; height: 600px; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
.cover {
  width: 600px; height: 600px;
  background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 40%, #2d1b69 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 40px;
}
.badge { display: inline-block; background: linear-gradient(135deg, #ff6b35, #f7931e); color: #fff; font-size: 12px; font-weight: 700; padding: 5px 14px; border-radius: 16px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 20px; }
.icon { font-size: 64px; margin-bottom: 20px; }
h1 { color: #fff; font-size: 36px; font-weight: 800; line-height: 1.15; margin-bottom: 16px; }
h1 span { background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.subtitle { color: #94a3b8; font-size: 16px; line-height: 1.4; margin-bottom: 28px; }
.tech-badges { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
.tech { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #e2e8f0; padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 600; }
</style></head>
<body>
<div class="cover">
  <div class="badge">Boilerplate</div>
  <div class="icon">&#x1F9E9;</div>
  <h1>Chrome Extension <span>MV3</span></h1>
  <p class="subtitle">React + TypeScript + Vite + Tailwind</p>
  <div class="tech-badges">
    <span class="tech">Popup</span>
    <span class="tech">Side Panel</span>
    <span class="tech">OAuth2</span>
    <span class="tech">BYOK</span>
  </div>
</div>
</body></html>

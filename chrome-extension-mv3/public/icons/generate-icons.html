<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<h2>Chrome Extension Icon Generator</h2>
<p>Open this file in a browser, right-click each canvas, and "Save image as" to get your icons.</p>
<p>Replace these with your actual brand icons before publishing.</p>

<script>
const sizes = [16, 32, 48, 128];
sizes.forEach(size => {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Background
  const gradient = ctx.createLinearGradient(0, 0, size, size);
  gradient.addColorStop(0, '#2563eb');
  gradient.addColorStop(1, '#7c3aed');
  ctx.fillStyle = gradient;

  // Rounded rect
  const r = size * 0.15;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.fill();

  // Letter
  ctx.fillStyle = 'white';
  ctx.font = `bold ${size * 0.55}px -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('E', size / 2, size / 2 + size * 0.03);

  const label = document.createElement('div');
  label.style.margin = '10px';
  label.innerHTML = `<strong>${size}x${size}</strong> — icon-${size}.png<br>`;
  label.appendChild(canvas);
  document.body.appendChild(label);
});
</script>
</body>
</html>
